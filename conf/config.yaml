# ==========================================
# Configuration
# ==========================================

# 1. 실행 파이프라인 설정
pipeline:
  run_all: false          # true일 경우 전체 파이프라인 순차 실행
  run_parse: false        # 파싱 실행 여부
  run_ingest: false       # DB 적재 실행 여부
  run_query: false        # 단일 질의(RAG) 실행 여부
  run_eval: false         # 평가 실행 여부
  run_chat: false         # 대화형 모드 실행 여부
  run_batch_eval: false   # 배치 평가 실행 여부
  run_retrieval_eval: false   # 검색 지표(Recall/MRR/NDCG/HitRate) 일괄 평가

# 2. 모델 및 프로바이더 설정
providers:
  embedding: "local"  # "local" | "openai"
  llm: "local"        # "local" | "openai"
  
  models:
    embedding:
      openai: "text-embedding-3-small"
      local: "BAAI/bge-m3"
    llm:
      openai: "gpt-5-nano"
      local: "exaone3.5:7.8b"

# 3. 벡터 데이터베이스 설정
vector_db:
  collection_names:
    local: "local_recursive_500_50"
    openai: "local_recursive_500_50"

# 4. 문서 파싱 및 청킹 설정
parsing:
  chunk_mode: "semantic"   # "recursive" | "semantic" | "sentence"
  use_contextual: false    # Contextual chunking 사용 여부
  chunk_size: 500
  chunk_overlap: 50
  
  semantic_threshold: 70
  sem_rec_chunksize: 1200
  sem_rec_overlap: 100
  
  sentences_per_chunk: 4
  sentence_overlap: 1
  match_threshold: 0.55

  run_ocr: true          # OCR 적용 유무

# 5. 검색(Retrieval) 설정
query: "대한상공회의소 기업 재생에너지 지원센터 홈페이지 개편 및 시스템 고도화 사업 수행 중 습득한 영업비밀의 보호와 관련하여 제안사가 준수해야 할 서약 사항은 무엇인가요?"

retrieval:
  top_k: 5
  candidate_k: 40
  score_threshold: 0.4
  search_mode: "hybrid"    # "vector" | "keyword" | "hybrid" | "mmr" | "hyde"
  use_multi_query: true
  multi_query_count: 5
  multi_query_rrf_k: 60
  rerank:
    enabled: true
    model: "BAAI/bge-reranker-large"
    max_length: 512
    batch_size: 16
    max_content_chars: 1800
    score_threshold: 0.35
    diversity_per_group: 1

  multi_query:
    enabled: true             # true면 multi-query 사용 / search_mode를 base로 사용
    method: "llm"             # LLM이 query 자동 분해
    query_count: 5


# 6. 메타데이터 필터 조건
filter:
  org: null                 # 발주 기관명 (부분 문자열 매칭)
  budget_min: null          # 사업 금액 최솟값 (원 단위)
  budget_max: null          # 사업 금액 최댓값 (원 단위)
  announce_after: null      # 공고일 시작 (YYYY-MM-DD)
  announce_before: null     # 공고일 종료 (YYYY-MM-DD)
  bid_start_after: null     # 입찰 시작일 (YYYY-MM-DD)
  bid_deadline_before: null # 입찰 마감일 (YYYY-MM-DD)
  title: null               # 사업명 키워드
  doc_id: null              # 공고 번호 (정확히 일치)
  no_auto: false            # 자동 추출 비활성화 여부

# 7. 대화형(Chat) 설정
chat:
  max_history_turns: 5

# 8. 평가(Evaluation) 설정
evaluation:
  model_name: "gpt-5-nano"
  is_local: false

  # 8-1. Retrieval 일괄 평가 (run_retrieval_eval=true 일 때 사용)
  retrieval_metrics:
    dataset_path: "data/eval_dataset.json"   # 평가 데이터셋 (file_name/user_input/reference 형식)
    output_dir: "eval_results"          # 결과 JSON 저장 위치
    top_k: 3                            # MRR/NDCG/HitRate 등 최종 컷오프
    candidate_k: 40                     # rerank 전 후보 컷오프 (Recall@candidate_k)
    langfuse_enabled: true              # aggregate score를 Langfuse에 fail-soft 등록

# 9. QueryRouter 설정
router:
  enabled: true             # false이면 라우터를 건너뛰고 retrieval 기본값 사용
  use_llm_classifier: true  # true이면 LLM 분류기 우선 (규칙 기반 fallback 포함)
                            # false이면 규칙 기반 분류기만 사용 (빠름, API 비용 없음)
  force_query_type: "comparative"   # 강제 지정 (테스트·디버그용, 평상시 주석 처리)

  # 질의 유형별 파라미터 Override
  overrides:
    factual:               # 사실 조회형: 정확한 수치·날짜
      search_mode: "hybrid"
      top_k: 5
      score_threshold: 0.4
      prompt_mode: "cot_few"
      use_multi_query: true
      llm_provider: "openai"
      llm_model: "gpt-5-nano"

    comparative:           # 비교 분석형: 여러 문서 대조
      search_mode: "mmr"
      top_k: 10
      score_threshold: 0.4
      prompt_mode: "cot_zero"
      use_multi_query: true
      llm_provider: "openai"
      llm_model: "gpt-5-nano"

    summarization:         # 요약형: 문서 전반 이해
      search_mode: "vector"
      top_k: 7
      score_threshold: 0.7
      prompt_mode: "cot_few"
      use_multi_query: false

    procedural:            # 절차형: 단계별 안내
      search_mode: "hybrid"
      top_k: 5
      score_threshold: 0.4
      prompt_mode: "cot_zero"
      use_multi_query: true

    analytical:            # 분석형: 평가·전략·장단점
      search_mode: "mmr"
      top_k: 5
      score_threshold: 0.7
      prompt_mode: "cot_zero"
      use_multi_query: true

    filter_based:          # 필터형: 기관·예산·날짜 조건 포함
      search_mode: "keyword"
      top_k: 5
      score_threshold: 0.3
      prompt_mode: "basic"
      use_multi_query: true

    unknown:               # 기본값
      search_mode: "hybrid"
      top_k: 5
      score_threshold: 0.4
      prompt_mode: "basic"
      use_multi_query: true
