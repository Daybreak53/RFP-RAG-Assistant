# ==========================================
# Configuration
# ==========================================

# 1. 실행 파이프라인 설정
pipeline:
  run_all: false       # true일 경우 전체 파이프라인 순차 실행
  run_parse: false     # 파싱 실행 여부
  run_ingest: false    # DB 적재 실행 여부
  run_query: false     # 단일 질의(RAG) 실행 여부
  run_eval: false      # 평가 실행 여부
  run_chat: false      # 대화형 모드 실행 여부

# 2. 모델 및 프로바이더 설정
providers:
  embedding: "local"  # "local" | "openai"
  llm: "local"        # "local" | "openai"
  
  models:
    embedding:
      openai: "text-embedding-3-small"
      local: "BAAI/bge-m3"
    llm:
      openai: "gpt-5-nano"
      local: "exaone3.5:7.8b"

# 3. 벡터 데이터베이스 설정
vector_db:
  collection_names:
    local: "rfp_rag_local"
    openai: "rfp_rag_openai"

# 4. 문서 파싱 및 청킹 설정
parsing:
  chunk_mode: "semantic"   # "recursive" | "semantic" | "sentence"
  use_contextual: false    # Contextual chunking 사용 여부
  chunk_size: 500
  chunk_overlap: 50
  
  semantic_threshold: 80
  sem_rec_chunksize: 1200
  sem_rec_overlap: 100
  
  sentences_per_chunk: 3
  sentence_overlap: 1
  match_threshold: 0.55

# 5. 검색(Retrieval) 설정
query: "제안서 본문 내용의 최대 페이지 수 제한과 제안서 요약서의 최대 페이지 수 제한은 각각 얼마인가?"

retrieval:
  top_k: 3
  score_threshold: 0.7
  search_mode: "keyword"    # "vector" | "keyword" | "hybrid" | "mmr" | "hyde"

  multi_query:
    enabled: true             # true면 multi-query 사용 / search_mode를 base로 사용
    method: "llm"             # LLM이 query 자동 분해
    query_count: 5


# 6. 메타데이터 필터 조건
filter:
  org: null                 # 발주 기관명 (부분 문자열 매칭)
  budget_min: null          # 사업 금액 최솟값 (원 단위)
  budget_max: null          # 사업 금액 최댓값 (원 단위)
  announce_after: null      # 공고일 시작 (YYYY-MM-DD)
  announce_before: null     # 공고일 종료 (YYYY-MM-DD)
  bid_start_after: null     # 입찰 시작일 (YYYY-MM-DD)
  bid_deadline_before: null # 입찰 마감일 (YYYY-MM-DD)
  title: null               # 사업명 키워드
  doc_id: null              # 공고 번호 (정확히 일치)
  no_auto: false            # 자동 추출 비활성화 여부

# 7. 대화형(Chat) 설정
chat:
  max_history_turns: 5

# 8. 평가(Evaluation) 설정
evaluation:
  model_name: "gpt-5-nano"
  is_local: false

# 9. QueryRouter 설정
router:
  enabled: true             # false이면 라우터를 건너뛰고 retrieval 기본값 사용
  use_llm_classifier: false # true이면 LLM 분류기 우선 (규칙 기반 fallback 포함)
                            # false이면 규칙 기반 분류기만 사용 (빠름, API 비용 없음)
  # force_query_type: "factual"   # 강제 지정 (테스트·디버그용, 평상시 주석 처리)

  # 질의 유형별 파라미터 Override
  overrides:
    factual:               # 사실 조회형: 정확한 수치·날짜
      search_mode: "hybrid"
      top_k: 5
      score_threshold: 0.5
      prompt_mode: "cot_few"
      use_multi_query: true
      llm_provider: "openai"
      llm_model: "gpt-5-nano"

    comparative:           # 비교 분석형: 여러 문서 대조
      search_mode: "hybrid"
      top_k: 5
      score_threshold: 0.5
      prompt_mode: "cot_zero"
      use_multi_query: true
      llm_provider: "openai"
      llm_model: "gpt-5-nano"

    summarization:         # 요약형: 문서 전반 이해
      search_mode: "vector"
      top_k: 4
      score_threshold: 0.55
      prompt_mode: "cot_few"
      use_multi_query: false

    procedural:            # 절차형: 단계별 안내
      search_mode: "hyde"
      top_k: 3
      score_threshold: 0.55
      prompt_mode: "cot_zero"
      use_multi_query: false

    analytical:            # 분석형: 평가·전략·장단점
      search_mode: "mmr"
      top_k: 5
      score_threshold: 0.5
      prompt_mode: "cot_zero"
      use_multi_query: true

    filter_based:          # 필터형: 기관·예산·날짜 조건 포함
      search_mode: "keyword"
      top_k: 5
      score_threshold: 0.0
      prompt_mode: "basic"
      use_multi_query: false

    unknown:               # 기본값
      search_mode: "hybrid"
      top_k: 3
      score_threshold: 0.6
      prompt_mode: "basic"
      use_multi_query: false