pipeline:
  run_all: false       # true일 경우 전체 파이프라인 순차 실행
  run_parse: false     # 파싱 실행 여부
  run_ingest: false    # DB 적재 실행 여부
  run_query: false     # 질의(RAG) 실행 여부
  run_eval: false      # 평가 실행 여부

parsing:
  chunk_mode: "semantic"   # "recursive" | "semantic" | "sentence"
  chunk_size: 500
  chunk_overlap: 50

  semantic_threshold: 60
  sem_rec_chunksize : 1200
  sem_rec_overlap : 120

  sentences_per_chunk: 3
  sentence_overlap: 1

  match_threshold: 0.55

collection_name:
  local: "rfp_rag_local"
  openai: "rfp_rag_openai"

query: "장애 발생 시 정상화 목표 시간과 발주기관 담당자 통보 절차는?"

retrieval:
  top_k: 3
  score_threshold: 0.7
  search_mode: "hybrid"    # "vector" | "keyword" | "hybrid"

providers:
  embedding: "local"  # 임베딩 모델
  llm: "local"        # LLM 모델

embed_model_name:
  openai: "text-embedding-3-small"
  local: "BAAI/bge-m3"

llm_model_name:
  openai: "gpt-5-nano"
  local: "BEXAONE-3.5-7.8B"

evaluation:
  model_name: "gpt-5-nano"
  is_local: false