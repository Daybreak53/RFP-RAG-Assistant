pipeline:
  run_all: false       # true일 경우 전체 파이프라인 순차 실행
  run_parse: false     # 파싱 실행 여부
  run_ingest: false    # DB 적재 실행 여부
  run_query: false     # 질의(RAG) 실행 여부
  run_eval: false      # 평가 실행 여부

parsing:
  chunk_mode: "semantic"   # "recursive" | "semantic" | "sentence"
  use_contextual : False   #  True
  chunk_size: 500
  chunk_overlap: 50

  semantic_threshold: 80
  sem_rec_chunksize : 1200
  sem_rec_overlap : 100

  sentences_per_chunk: 3
  sentence_overlap: 1

  match_threshold: 0.55

collection_name:
  local: "rfp_rag_local"
  openai: "rfp_rag_openai"

query: "부산국제영화제 용역 지침에서 제안서 본문의 최대 페이지 수 제한과 제안서 요약서의 최대 페이지 수 제한은 각각 얼마인가?"

retrieval:
  top_k: 3
  score_threshold: 0.7
  search_mode: "hybrid"    # "vector" | "keyword" | "hybrid" | "mmr" | "hyde"

  multi_query:
    enabled: true           # true면 multi-query 사용 / search_mode를 base로 사용
    method: "llm"           # LLM이 query 자동 분해
    query_count: 5

providers:
  embedding: "local"  # 임베딩 모델
  llm: "local"        # LLM 모델

embed_model_name:
  openai: "text-embedding-3-small"
  local: "BAAI/bge-m3"

llm_model_name:
  openai: "gpt-5-nano"
  local: "exaone3.5:7.8b"

evaluation:
  model_name: "gpt-5-nano"
  is_local: false