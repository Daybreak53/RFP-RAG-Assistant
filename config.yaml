pipeline:
  run_all: false       # true일 경우 전체 파이프라인 순차 실행
  run_parse: false     # 파싱 실행 여부
  run_ingest: false    # DB 적재 실행 여부
  run_query: false     # 질의(RAG) 실행 여부
  run_eval: false      # 평가 실행 여부

parsing:
  chunk_mode: "recursive"   # "recursive" | "semantic" | "sentence"
  chunk_size: 500
  chunk_overlap: 50

  semantic_threshold: 60
  sem_rec_chunksize : 1200
  sem_rec_overlap : 120

  sentences_per_chunk: 3
  sentence_overlap: 1

  match_threshold: 0.55

collection_name:
  local: "rfp_rag_local_sem_70_1100_120"
  openai: "rfp_rag_openai"

query: "유사용역사업 이행실적 평가에서 만점(4점)을 받으려면 최근 3년간 실적 합산금액이 사업 예정가격의 몇 % 이상이어야 하는가?"

retrieval:
  top_k: 3
  score_threshold: 0.3
  search_mode: "hybrid"    # "vector" | "keyword" | "hybrid" | "mmr" | "hyde"

providers:
  embedding: "local"  # 임베딩 모델
  llm: "local"        # LLM 모델

embed_model_name:
  openai: "text-embedding-3-small"
  local: "BAAI/bge-m3"

llm_model_name:
  openai: "gpt-5-nano"
  local: "exaone3.5:7.8b"

evaluation:
  model_name: "gpt-5-nano"
  is_local: false