pipeline:
  run_all: false       # true일 경우 전체 파이프라인 순차 실행
  run_parse: false     # 파싱 실행 여부
  run_ingest: false    # DB 적재 실행 여부
  run_query: true      # 질의(RAG) 실행 여부
  run_eval: false      # 평가 실행 여부

collection_name:
  local: "rfp_rag_local"
  openai: "rfp_rag_openai"

query: "AWS 리소스가 필요한 사업 찾아줘"

providers:
  embedding: "openai"  # 임베딩 모델
  llm: "openai"        # LLM 모델

evaluation:
  model_name: "gpt-5-nano"
  is_local: false